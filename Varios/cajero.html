
<!DOCTYPE html>
<html lang="es">

<head>
    <title>Cajero Automático (ATM)</title>
</head>

<body>
    <div id="pantalla">
        <p>¡Bienvenido al cajero del Banco Centralino!</p>
        <p>Por favor, seleccione una opción:</p>
        <button id="retiro" onclick="retiro()">Retiro</button>
        <button id="desposito" onclick="deposito()">Depósito</button>
        <button id="crear">Crear una cuenta</button>
    </div>
</body>

<script>
let usuarios=[{cedula:"1207499999", nombres:"LOOR MARVIN", telefono:"0982799999", cuentas:[
    {
        tipo:"AHORROS", 
        numero:"19112005",
        pin:"4321",
        saldo:150.00
    }]},{cedula:"1550199999", nombres:"FIALLOS BRYANA", telefono:"0991699999", cuentas:[
    {
        tipo:"AHORROS", 
        numero:"19052006",
        pin:"8765",
        saldo:10.00
    },{
          tipo:"CORRIENTE", 
          numero:"03052006",
          pin:"8765",
          saldo:1000.00}]}]

let pantalla = document.getElementById("pantalla");
let verInicio = pantalla.innerHTML;
const btnCancelar = "<button id=\"cancelar\" onclick=\"cancelar()\">Cancelar </button>"

function retiro() {
    let input = prompt("Ingrese su número de cédula: ").trim();
    let usuario = usuarios.find(u => u.cedula == input);

    if (usuario) {
       pantalla.innerHTML = `¡Bienvenido, <strong>${usuario.nombres}</strong>!<br><br>`;
       pantalla.innerHTML += btnCancelar; 
       
    } else {
        alert("Usuario no encontrado");
    }
}

function cancelar() {
    pantalla.innerHTML = verInicio;
}

function deposito() {
    let input = prompt("Ingrese el número de cuenta: ").trim();
    let usuario = usuarios.find( u => u.cuentas.find(n => n.numero == input) );

    if(usuario) {
        let confirmar = confirm(`¿Desea depositar a ${usuario.nombres}?`);
        if (confirmar) {
            input = Number(prompt("Ingrese la cantidad a depositar"))
            confirmar = confirm(`¿Desea usted depositar $${input}?`)
            if (confirmar) {
                alert(`Se depositaron $${input} correctamente.`)
            }
        }
    } else {
        alert("Usuario no encontrado")
    }
}
</script>

</html>
