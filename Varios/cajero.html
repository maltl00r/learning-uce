
<!DOCTYPE html>
<html lang="es">

<head>
    <title>Cajero Automático (ATM)</title>
</head>

<body>
    <div id="pantalla">
        <p>¡Bienvenido al cajero del Banco Centralino!</p>
        <p>Por favor, seleccione una opción:</p>
        <button id="retiro" onclick="retiro()">Retiro</button>
        <button id="deposito" onclick="deposito()">Depósito</button>
        <button id="crear">Crear una cuenta</button>
    </div>
</body>

<script>
let usuarios=[{cedula:"1207499999", nombres:"LOOR MARVIN", telefono:"0982799999", cuentas:[
    {
        tipo:"AHORROS", 
        numero:"19112005",
        pin:"4321",
        saldo:150.00
    }]},{cedula:"1550199999", nombres:"FIALLOS BRYANA", telefono:"0991699999", cuentas:[
    {
        tipo:"AHORROS", 
        numero:"19052006",
        pin:"8765",
        saldo:10.00
    },{
          tipo:"CORRIENTE", 
          numero:"03052006",
          pin:"8765",
          saldo:1000.00}]}]

let pantalla = document.getElementById("pantalla");
let versInicio = pantalla.innerHTML;
let numeroC, tipo;

function addBtn(tipo) {
    pantalla.innerHTML += `<input id="input" type="string">`;
    pantalla.innerHTML += `<button onclick="confirmar('${tipo}')">Aceptar</button>`;
    pantalla.innerHTML += `<button id="cancelar" onclick="cancelar()">Cancelar </button>`;
}
function cancelar() {
    pantalla.innerHTML = versInicio;
}

function retiro() {
    tipo = 'retiro'
    pantalla.innerHTML = "Ingrese su número de cédula<br>";
    addBtn(tipo)

}

function deposito() {
    tipo = 'deposito'
    pantalla.innerHTML = "Ingrese el número de cuenta en el que va a realizar un depósito<br>";
    addBtn(tipo)
}

function confirmar(tipo) {
    let input = document.getElementById("input").value;
    
    if(tipo==='retiro'){
        let usuario = usuarios.find(u => u.cedula == input);
        if (usuario) {
            pantalla.innerHTML = `
            Bienvenido/a <strong>${usuario.nombres}</strong><br>
            Ingrese monto a retirar<br>
            `;
        return;
        }

    }else if(tipo==='deposito') {
        console.log(tipo)
    }

}

</script>

</html>
