        <button id="deposito" onclick="deposito()">Depósito</button>
        <button id="crear" onclick="cuenta()">Crear una cuenta</button>
    </div>

<script>
let usuarios=[{cedula:"1207499999", nombres:"LOOR MARVIN", telefono:"0982799999", cuentas:[

let pantalla = document.getElementById("pantalla");
let versInicio = pantalla.innerHTML;
let usuarioActual;
const btnCancelar = `<button onclick="cancelar()">Cancelar</button>`;
const formCedula = `
    <p>Ingrese su número de cédula</p>
    <input type="text" id="cedula">
    `;

function buscarCedula() {
    let input = document.getElementById("cedula").value.trim();

    let usuario = usuarios.find(u => u.cedula === input);

    if (usuario) {
        usuarioActual = usuario;
        return true;
    } else {
        alert("No se encontró ningún usuario");
        return false;
    }
}



function cancelar() {
    pantalla.innerHTML = versInicio;
}

function retiro() {
    pantalla.innerHTML = formCedula;
    pantalla.innerHTML += `<button onclick="buscarCedula()">Buscar</button>`
    pantalla.innerHTML += btnCancelar;

}

}

function cuenta() {
    pantalla.innerHTML = `
    ${formCedula}
    <button onclick="creacionCuenta()">Buscar</button>
    ${btnCancelar}
    `;
}
    
function creacionCuenta() {
    if(buscarCedula()===true) {
        pantalla.innerHTML= `
        <p>Por favor, llene sus datos para crear una cuenta.</p>

        <form class="crear-cuenta" onsubmit="guardarCuenta(event)">
            <p><strong>Nombres:</strong> ${usuarioActual.nombres}</p>
            <p><strong>Cédula:</strong> ${usuarioActual.cedula}</p>
            <p><strong>Numero de teléfono:</strong> ${usuarioActual.telefono}</p>

            <label for="pin">Seleccione su PIN:</label><br>
            <input type="number" id="pin" name="pin"><br>

            <p>Seleccione el tipo de cuenta:</p>
            <input type="radio" id="ahorros" name="crear-cuenta" value="AHORROS">
            <label for="ahorros">Ahorros</label><br>
            <input type="radio" id="corriente" name="crear-cuenta" value="CORRIENTE">
            <label for="corriente">Corriente</label><br>

            <button type="submit">Crear cuenta</button>
        </form>
        ${btnCancelar}
        `;
    } else {
        pantalla.innerHTML = `
        <p>¿Desea crear una cuenta en nuestro banco?</p>
        <button onclick="crearCuenta()">Crear cuenta</button>
        ${btnCancelar}
        `;
    }
}

</script>

</html>
