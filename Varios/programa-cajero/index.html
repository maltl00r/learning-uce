
<!DOCTYPE html>
<html lang="es">

<head>
    <script src="js/main.js" type="module"></script>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1b1b2f;
            font-family: Arial, sans-serif;
        }
        #cajero-contenedor {
            background: #2c2c3e;
            width: 320px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0,0,0,0.6);
        }
        #mensaje {
            background: black;
            color: #00ff00;
            padding: 15px;
            border-radius: 8px;
            min-height: 60px;
            margin-bottom: 15px;
            font-family: monospace;
        }
        .vista {
            text-align: center;
        }

        /* Títulos */
        h2 {
            color: white;
        }

        /* Texto */
        p {
            color: #ddd;
        }

        /* Botones */
        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background: #767c41;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #a17922;
        }

        /* Botones específicos */
        #btn-confirmar {
            background: green;
        }

        #btn-confirmar:hover {
            background: #00a000;
        }

        #btn-cancelar {
            background: red;
        }

        #btn-cancelar:hover {
            background: #c00000;
        }

        /* Inputs dinámicos */
        #campos-dinamicos input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
            border: none;
            outline: none;
        }
    </style>
    <title>Cajero Automático (ATM)</title>
</head>

<body>
    <div id="cajero-contenedor">
        <div id="mensaje">
            
        </div>

        <div id="menu-principal" class="vista">
            <p>¡Bienvenido al cajero del Banco Centralino!</p>
            <p>Por favor, seleccione una opción:</p>
            <button id="btn-retiro">Retiro</button>
            <button id="btn-deposito">Depósito</button>
            <button id="btn-crear">Crear una cuenta</button>
        </div>


        <div id="pantalla-formulario" class="vista" style="display: none;">
            <h2 id="titulo-form">Operación</h2>
            <div id="campos-dinamicos">
                
            </div>
            <button id="btn-confirmar">Confirmar</button>
            <button id="btn-cancelar">Cancelar</button>
        </div>
    </div>
</body>

</html>
